name: Build ESP32 Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware-src/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:  # allow manual trigger from GitHub UI

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install required libraries
        run: |
          arduino-cli lib install "WebSockets@2.4.1"
          arduino-cli lib install "ArduinoJson@6.21.3"
          arduino-cli lib install "SocketIOclient@0.0.6"

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build \
            ./firmware-src/tally-arbiter-esp32

      - name: Copy binaries to firmware folder
        run: |
          mkdir -p firmware
          cp build/tally-arbiter-esp32.ino.bin          firmware/tally-arbiter-esp32.bin
          cp build/tally-arbiter-esp32.ino.bootloader.bin firmware/bootloader.bin
          cp build/tally-arbiter-esp32.ino.partitions.bin firmware/partitions.bin

      - name: Commit firmware binaries
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "ci: rebuild firmware binaries [skip ci]"
          file_pattern: "firmware/*.bin"
