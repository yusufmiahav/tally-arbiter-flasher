name: Build Firmware

on:
  push:
    branches: [ main ]
    paths:
      - 'firmware-src/**'
      - '.github/workflows/build.yml'
  workflow_dispatch:

jobs:

  # ─────────────────────────────────────
  #  ESP32
  # ─────────────────────────────────────
  build-esp32:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core update-index
          arduino-cli core install esp32:esp32@2.0.14

      - name: Install libraries
        run: |
          arduino-cli lib install "WebSockets@2.4.1"
          arduino-cli lib install "ArduinoJson@6.21.3"

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn esp32:esp32:esp32 \
            --output-dir ./build-esp32 \
            ./firmware-src/tally-arbiter-esp32

      - name: Copy binaries
        run: |
          mkdir -p firmware
          cp build-esp32/tally-arbiter-esp32.ino.bin             firmware/tally-arbiter-esp32.ino.bin
          cp build-esp32/tally-arbiter-esp32.ino.bootloader.bin  firmware/tally-arbiter-esp32.ino.bootloader.bin
          cp build-esp32/tally-arbiter-esp32.ino.partitions.bin  firmware/tally-arbiter-esp32.ino.partitions.bin

      - name: Commit ESP32 binaries
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: rebuild ESP32 firmware [skip ci]"
          file_pattern: "firmware/tally-arbiter-esp32*"
          push_options: '--force'

  # ─────────────────────────────────────
  #  ESP8266
  # ─────────────────────────────────────
  build-esp8266:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP8266 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://arduino.esp8266.com/stable/package_esp8266com_index.json
          arduino-cli core update-index
          arduino-cli core install esp8266:esp8266@3.1.2

      - name: Install libraries
        run: |
          arduino-cli lib install "WebSockets@2.4.1"
          arduino-cli lib install "ArduinoJson@6.21.3"

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn esp8266:esp8266:nodemcuv2 \
            --build-property "build.flash_size=4M" \
            --build-property "build.flash_freq=40" \
            --output-dir ./build-esp8266 \
            ./firmware-src/tally-arbiter-esp8266

      - name: Copy binary
        run: |
          mkdir -p firmware
          cp build-esp8266/tally-arbiter-esp8266.ino.bin firmware/tally-arbiter-esp8266.ino.bin

      - name: Commit ESP8266 binary
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: rebuild ESP8266 firmware [skip ci]"
          file_pattern: "firmware/tally-arbiter-esp8266*"
          push_options: '--force'

  # ─────────────────────────────────────
  #  Arduino UNO R4 WiFi
  # ─────────────────────────────────────
  build-unor4wifi:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v5

      - name: Set up Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install UNO R4 platform
        run: |
          arduino-cli config init
          arduino-cli config add board_manager.additional_urls \
            https://downloads.arduino.cc/packages/package_index.json
          arduino-cli core update-index
          arduino-cli core install arduino:renesas_uno@1.2.2

      - name: Install libraries
        run: |
          arduino-cli lib install "WebSockets@2.4.1"
          arduino-cli lib install "ArduinoJson@6.21.3"
          arduino-cli lib install "ArduinoGraphics"

      - name: Build firmware
        run: |
          arduino-cli compile \
            --fqbn arduino:renesas_uno:unor4wifi \
            --output-dir ./build-unor4wifi \
            ./firmware-src/tally-arbiter-unor4wifi

      - name: Copy binary
        run: |
          mkdir -p firmware
          cp build-unor4wifi/tally-arbiter-unor4wifi.ino.bin firmware/tally-arbiter-unor4wifi.ino.bin

      - name: Commit UNO R4 binary
        uses: stefanzweifel/git-auto-commit-action@v6
        with:
          commit_message: "ci: rebuild UNO R4 WiFi firmware [skip ci]"
          file_pattern: "firmware/tally-arbiter-unor4wifi*"
          push_options: '--force'
